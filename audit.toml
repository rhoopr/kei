# cargo-audit advisory ignores. Auto-loaded from the working directory
# by both `cargo audit` in CI and `just gate` locally.

[advisories]
ignore = [
    # `paste` unmaintained; reaches kei only transitively via `mp4-atom`
    # (pure-Rust HEIC atom editor). No mp4-atom replacement yet.
    "RUSTSEC-2024-0436",

    # `rand 0.9.2` unsound with a custom logger. kei's direct
    # rand=0.10.1 is unaffected; the 0.9.2 copy reaches us only
    # transitively via reqwest -> quinn -> quinn-proto.
    "RUSTSEC-2026-0097",
]
