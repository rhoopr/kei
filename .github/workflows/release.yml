name: Release

on:
  release:
    types: [created]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: kei-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: kei-linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: kei-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: kei-macos-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: kei-windows-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev

      - name: Install system dependencies (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo dpkg --add-architecture arm64
          # Pin existing sources to amd64 only (handles both .list and .sources formats)
          sudo sed -i 's|^deb http|deb [arch=amd64] http|g' /etc/apt/sources.list.d/*.list 2>/dev/null || true
          sudo sed -i '/^Architectures:/d; /^Types:/a Architectures: amd64' /etc/apt/sources.list.d/*.sources 2>/dev/null || true
          # Add arm64 from ports
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports $(lsb_release -cs) main restricted universe" | sudo tee /etc/apt/sources.list.d/arm64.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports $(lsb_release -cs)-updates main restricted universe" | sudo tee -a /etc/apt/sources.list.d/arm64.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports $(lsb_release -cs)-security main restricted universe" | sudo tee -a /etc/apt/sources.list.d/arm64.list
          sudo apt-get update
          # g++-aarch64-linux-gnu is required for xmp_toolkit, which vendors
          # Adobe's XMP Toolkit C++ source and compiles it via the `cc` crate.
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu libdbus-1-dev:arm64

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CXX_aarch64_unknown_linux_gnu: aarch64-linux-gnu-g++
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_CXX: aarch64-linux-gnu-g++
          PKG_CONFIG_ALLOW_CROSS: 1
          PKG_CONFIG_PATH: /usr/lib/aarch64-linux-gnu/pkgconfig

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          tar czvf ../../../${{ matrix.name }}.tar.gz kei
          cd -

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../${{ matrix.name }}.zip kei.exe
          cd -

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            ${{ matrix.name }}.tar.gz
            ${{ matrix.name }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec mv {} . \;
          sha256sum *.tar.gz *.zip > SHA256SUMS.txt
          cat SHA256SUMS.txt
          cd -

      - name: Generate release notes
        id: release_notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          # Extract the current version's section from CHANGELOG.md
          # Captures everything between ## [VERSION] and the next ## [ or ---
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} /^## \[|^---/{if(found) exit} found" CHANGELOG.md)

          if [ -z "$NOTES" ]; then
            # Fall back to git log if CHANGELOG section not found
            PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
            echo "notes<<EOF" >> $GITHUB_OUTPUT
            if [ -z "$PREV_TAG" ]; then
              echo "Initial release" >> $GITHUB_OUTPUT
            else
              echo "## Changes since $PREV_TAG" >> $GITHUB_OUTPUT
              echo "" >> $GITHUB_OUTPUT
              git log --pretty=format:"- %s" $PREV_TAG..HEAD >> $GITHUB_OUTPUT
              echo "" >> $GITHUB_OUTPUT
            fi
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "notes<<EOF" >> $GITHUB_OUTPUT
            echo "$NOTES" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "---" >> $GITHUB_OUTPUT
            echo "**Full changelog:** [CHANGELOG.md](https://github.com/rhoopr/kei/blob/${{ github.ref_name }}/CHANGELOG.md)" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Upload release assets
        uses: softprops/action-gh-release@v1
        with:
          body: ${{ steps.release_notes.outputs.notes }}
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          repository: rhoopr/homebrew-kei
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update formula
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BASE="https://github.com/rhoopr/kei/releases/download/${{ github.ref_name }}"

          declare -A ASSETS=(
            [macos-aarch64]="kei-macos-aarch64.tar.gz"
            [macos-x86_64]="kei-macos-x86_64.tar.gz"
            [linux-aarch64]="kei-linux-aarch64.tar.gz"
            [linux-x86_64]="kei-linux-x86_64.tar.gz"
          )

          declare -A SHAS
          for key in "${!ASSETS[@]}"; do
            file="${ASSETS[$key]}"
            curl -sL "$BASE/$file" -o "/tmp/$file"
            SHAS[$key]=$(sha256sum "/tmp/$file" | cut -d' ' -f1)
          done

          cat > Formula/kei.rb << FORMULA
          class Kei < Formula
            desc "Photo sync engine - compact, efficient, reliable"
            homepage "https://github.com/rhoopr/kei"
            version "$VERSION"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "$BASE/${ASSETS[macos-aarch64]}"
                sha256 "${SHAS[macos-aarch64]}"
              else
                url "$BASE/${ASSETS[macos-x86_64]}"
                sha256 "${SHAS[macos-x86_64]}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "$BASE/${ASSETS[linux-aarch64]}"
                sha256 "${SHAS[linux-aarch64]}"
              else
                url "$BASE/${ASSETS[linux-x86_64]}"
                sha256 "${SHAS[linux-x86_64]}"
              end
            end

            def install
              bin.install "kei"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/kei --version")
              assert_match "kei", shell_output("#{bin}/kei --help")
            end
          end
          FORMULA

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' Formula/kei.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/kei.rb
          git commit -m "kei ${GITHUB_REF_NAME#v}"
          git push
