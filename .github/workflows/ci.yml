name: Rust CI

on:
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # Treat any compiler warning as an error to keep the codebase warning-free
  RUSTFLAGS: "-Dwarnings"

jobs:
  # Enforces consistent code style across the project
  # Fails if any code isn't formatted with rustfmt
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  # Catches common mistakes, unidiomatic code, and potential bugs
  # Acts as an additional layer of static analysis beyond the compiler
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      # Caches compiled dependencies to speed up subsequent runs
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features

  # Runs the test suite on all major platforms to catch platform-specific bugs
  # fail-fast: false ensures all platforms run even if one fails
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-features

  # Ensures documentation builds without warnings
  # Important for maintaining quality docs, especially for published crates
  docs:
    name: Docs
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-Dwarnings"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --no-deps --all-features

  # Detects dependencies declared in Cargo.toml but not actually used
  # Keeps the dependency tree lean and reduces compile times
  # Requires nightly because cargo-udeps uses unstable features
  unused-deps:
    name: Unused Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: taiki-e/install-action@cargo-udeps
      - run: cargo +nightly udeps --all-targets

  # Verifies Cargo.lock is committed and in sync with Cargo.toml
  # Ensures reproducible builds and prevents "works on my machine" issues
  lockfile:
    name: Lockfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fetch --locked

  # Measures what percentage of code is exercised by tests
  # Fails the PR if overall or per-file coverage drops below thresholds
  # Thresholds are configured in coverage-thresholds.json
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage
        run: |
          # Exclude state_auth and setup_auth (require live iCloud credentials)
          cargo llvm-cov --all-features --test cli --test state --lcov --output-path lcov.info
          cargo llvm-cov report --all-features > coverage.txt
          cargo llvm-cov report --all-features --json --output-path coverage.json
          cargo llvm-cov report --all-features --html --output-dir coverage-html
          cat coverage.txt
      - name: Enforce coverage thresholds
        run: scripts/check-coverage.sh coverage.json
      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage-html/
            lcov.info
          retention-days: 14
      - name: Post coverage comment
        if: github.event_name == 'pull_request' && always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          OVERALL=$(jq '.data[0].totals.lines.percent' coverage.json)
          THRESHOLD=$(jq '.overall' coverage-thresholds.json)
          TESTS=$(grep -E "^test result:" coverage.txt | grep -oE "[0-9]+ passed" | grep -oE "[0-9]+")

          # Build per-file table from thresholds config
          FILE_TABLE=""
          for file in $(jq -r '.files | keys[]' coverage-thresholds.json); do
            ft=$(jq -r --arg f "$file" '.files[$f]' coverage-thresholds.json)
            fc=$(jq -r --arg f "$file" '.data[0].files[] | select(.filename | endswith($f)) | .summary.lines.percent' coverage.json)
            if [ -n "$fc" ]; then
              if [ "$(echo "$fc < $ft" | bc -l)" -eq 1 ]; then
                FILE_TABLE="${FILE_TABLE}| \`${file}\` | ${fc}% | ${ft}% | :x: |\n"
              else
                FILE_TABLE="${FILE_TABLE}| \`${file}\` | ${fc}% | ${ft}% | :white_check_mark: |\n"
              fi
            fi
          done

          if [ "$(echo "$OVERALL < $THRESHOLD" | bc -l)" -eq 1 ]; then
            STATUS=":red_circle: **FAILED** — below ${THRESHOLD}% threshold"
          else
            STATUS=":green_circle: **Passed** — meets ${THRESHOLD}% threshold"
          fi

          {
            echo "## Coverage Report"
            echo ""
            echo "${STATUS}"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| **Line Coverage** | ${OVERALL}% |"
            echo "| **Threshold** | ${THRESHOLD}% |"
            echo "| **Tests Passed** | ${TESTS} |"
            echo ""
            if [ -n "$FILE_TABLE" ]; then
              echo "<details><summary>Per-file coverage</summary>"
              echo ""
              echo "| File | Coverage | Threshold | Status |"
              echo "|------|----------|-----------|--------|"
              echo -e "$FILE_TABLE"
              echo "</details>"
            fi
          } > comment.md

          gh pr comment ${{ github.event.pull_request.number }} --body-file comment.md || echo "Failed to post comment"

  # Compiles release builds on all platforms to catch platform-specific compile errors
  # Release mode can surface different issues than debug mode (e.g., optimization bugs)
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release

  # Checks dependencies against the RustSec Advisory Database
  # Catches known security vulnerabilities in your dependency tree
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@cargo-audit
      # Ignore unmaintained warnings (informational, not vulnerabilities)
      - run: cargo audit --ignore RUSTSEC-2024-0436 --ignore RUSTSEC-2025-0119

  # Verifies the Dockerfile builds successfully
  # Catches build breakage before it hits the publish workflow on main
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Catches spelling mistakes in code, comments, and documentation
  # Small thing but helps maintain a professional codebase
  typos:
    name: Typos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: crate-ci/typos@master
