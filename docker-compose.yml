services:
  icloudpd-rs:
    image: ghcr.io/rhoopr/icloudpd-rs:latest
    container_name: icloudpd-rs
    restart: unless-stopped
    environment:
      - ICLOUD_USERNAME=${ICLOUD_USERNAME}
      - ICLOUD_PASSWORD=${ICLOUD_PASSWORD}
      - TZ=${TZ:-UTC}
    volumes:
      - ./config:/config
      - /path/to/photos:/photos
